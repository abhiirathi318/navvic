<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Navvic — Business Card Concepts</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --abyss-950:#03111f; --abyss-900:#06192c; --abyss-800:#0a2540; --abyss-700:#0e3354;
    --ocean-600:#0b6e8f; --ocean-500:#0e8bb0; --ocean-400:#22a7c9; --ocean-300:#57c6e0;
    --foam-200:#b8ecf7; --foam-100:#e3f7fc;
    --s:2.25; /* on-screen scale of the real card */
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    font-family:"Inter",system-ui,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%, #0b2236, #050d17 60%);
    color:#cfe7f2; padding:48px 24px 80px; -webkit-font-smoothing:antialiased;
  }
  .page-head{ max-width:1100px; margin:0 auto 8px; }
  .page-head h1{ font-family:"Plus Jakarta Sans"; font-weight:800; font-size:30px; color:#fff; letter-spacing:-.02em; }
  .page-head p{ margin-top:8px; color:#8fb3c9; font-size:14px; max-width:680px; line-height:1.6; }
  .toolbar{ max-width:1100px; margin:18px auto 0; }
  .toolbar button{
    font:inherit; font-weight:600; font-size:13px; color:#06192c; cursor:pointer;
    background:linear-gradient(135deg,var(--ocean-300),var(--ocean-500)); border:0;
    padding:10px 18px; border-radius:12px;
  }
  .concept{ max-width:1100px; margin:46px auto 0; }
  .concept > h2{
    font-family:"Plus Jakarta Sans"; font-weight:700; font-size:13px; letter-spacing:.18em;
    text-transform:uppercase; color:var(--ocean-300); margin-bottom:4px;
  }
  .concept > .sub{ color:#7fa0b6; font-size:13px; margin-bottom:22px; }
  .row{ display:flex; flex-wrap:wrap; gap:34px 30px; }
  .unit{ }
  .label{ margin-top:10px; font-size:11px; color:#7fa0b6; letter-spacing:.04em; }
  .label b{ color:#bcd9e8; font-weight:600; }

  /* ---- card stage (scales the real-size card for screen) ---- */
  .stage{ width:calc(88.9mm * var(--s)); height:calc(50.8mm * var(--s)); position:relative;
          border-radius:calc(3mm * var(--s)); box-shadow:0 30px 60px -20px rgba(0,0,0,.6); }
  .card{ position:absolute; top:0; left:0; width:88.9mm; height:50.8mm;
         transform:scale(var(--s)); transform-origin:top left; overflow:hidden;
         border-radius:3mm; }

  .card .inner{ position:absolute; inset:0; padding:5mm 5.6mm; display:flex; flex-direction:column; }
  .anchor{ width:5mm; height:5mm; }
  .brandrow{ display:flex; align-items:center; gap:2mm; }
  .mono{ width:7mm; height:7mm; border-radius:2mm; display:flex; align-items:center; justify-content:center;
         background:linear-gradient(135deg,var(--ocean-400),var(--abyss-800)); color:#fff; }
  .mono .anchor{ width:4mm; height:4mm; }
  .wordmark{ font-family:"Plus Jakarta Sans"; font-weight:800; font-size:11pt; letter-spacing:-.01em; line-height:1; }
  .wordmark .ac{ color:var(--ocean-400); }
  .tag{ font-size:5pt; letter-spacing:.22em; text-transform:uppercase; margin-top:1mm; }

  .spacer{ flex:1; }
  .name{ font-family:"Plus Jakarta Sans"; font-weight:800; font-size:13.5pt; letter-spacing:-.01em; line-height:1.05; }
  .role{ font-size:5.6pt; letter-spacing:.2em; text-transform:uppercase; margin-top:1.4mm; }
  .rule{ width:9mm; height:.5mm; border-radius:1mm; background:var(--ocean-400); margin:2.6mm 0; }
  .contacts{ display:flex; flex-direction:column; gap:1.4mm; }
  .c{ display:flex; align-items:center; gap:1.8mm; font-size:7.2pt; }
  .c svg{ width:3.1mm; height:3.1mm; flex:none; color:var(--ocean-400); }
  .web{ font-size:6.4pt; letter-spacing:.04em; }

  /* ---- backs ---- */
  .card.back .inner{ align-items:center; justify-content:center; text-align:center; }
  .qrpanel{ background:#fff; border-radius:2.4mm; padding:2.4mm; width:24mm; height:24mm; }
  .qrpanel svg{ width:100%; height:100%; display:block; }
  .qrbg{ fill:#fff; }
  .qrfg{ stroke:var(--abyss-900); stroke-width:1; }
  .back .wordmark{ font-size:13pt; }
  .scan{ font-size:6pt; letter-spacing:.22em; text-transform:uppercase; margin-top:3mm; }
  .back .web{ font-size:7pt; margin-top:1mm; }

  /* decorative layers */
  .glow{ position:absolute; width:40mm; height:40mm; border-radius:50%; filter:blur(14mm);
         background:var(--ocean-500); opacity:.0; pointer-events:none; }
  .wave{ position:absolute; left:0; right:0; bottom:0; height:18mm; opacity:0; }
  .bar{ position:absolute; top:0; bottom:0; left:0; width:2.2mm; background:linear-gradient(var(--ocean-300),var(--ocean-600)); opacity:0; }
  .mono .mark{ width:4.6mm; height:4.6mm; }
  .ship{ position:absolute; top:50%; right:6.4mm; transform:translateY(-50%);
         width:28mm; height:19.5mm; opacity:0; pointer-events:none; }
  .card.front .ship{ opacity:1; }
  /* soft halo so the vessel reads on the dark card */
  .shipglow{ position:absolute; top:50%; right:2mm; transform:translateY(-50%);
             width:36mm; height:26mm; border-radius:50%;
             filter:blur(8mm); background:radial-gradient(closest-side, rgba(34,167,201,.18), transparent);
             opacity:0; pointer-events:none; }
  .c1 .card.front .shipglow{ opacity:1; }

  /* ============ CONCEPT 1 — ABYSS (dark) ============ */
  .c1 .card{ background:linear-gradient(150deg,var(--abyss-800),var(--abyss-950)); color:#eaf6fb; }
  .c1 .glow{ opacity:.35; top:-16mm; right:-14mm; }
  .c1 .role,.c1 .tag,.c1 .web{ color:var(--ocean-300); }
  .c1 .name{ color:#fff; }
  .c1 .c{ color:#cfe7f2; }
  .c1.back .card{ background:linear-gradient(150deg,var(--abyss-800),var(--abyss-950)); }
  .c1 .scan{ color:var(--ocean-300); }

  /* ============ CONCEPT 2 — FOAM (light) ============ */
  .c2 .card{ background:#ffffff; color:var(--abyss-900); }
  .c2 .inner{ padding-left:8mm; }
  .c2 .bar{ opacity:1; }
  .c2 .mono{ background:linear-gradient(135deg,var(--ocean-400),var(--ocean-600)); }
  .c2 .wordmark{ color:var(--abyss-900); }
  .c2 .role,.c2 .tag{ color:var(--ocean-600); }
  .c2 .web{ color:var(--ocean-600); }
  .c2 .name{ color:var(--abyss-900); }
  .c2 .c{ color:#33576e; }
  .c2.back .card{ background:linear-gradient(140deg,var(--ocean-400),var(--ocean-600)); color:#fff; }
  .c2.back .bar{ opacity:0; }
  .c2.back .wordmark{ color:#fff; }
  .c2.back .web,.c2.back .scan{ color:#eaf9ff; }

  /* ============ CONCEPT 3 — WAVE (light + wave) ============ */
  .c3 .card{ background:linear-gradient(180deg,#ffffff,#f1fafd); color:var(--abyss-900); }
  .c3 .wave{ opacity:1; }
  .c3 .mono{ background:linear-gradient(135deg,var(--ocean-400),var(--ocean-600)); }
  .c3 .role,.c3 .tag,.c3 .web{ color:var(--ocean-600); }
  .c3 .name{ color:var(--abyss-900); }
  .c3 .c{ color:#33576e; }
  .c3.back .card{ background:linear-gradient(160deg,var(--abyss-800),var(--abyss-950)); color:#eaf6fb; }
  .c3.back .wave path:nth-child(1){ fill:rgba(34,167,201,.18); }
  .c3.back .wave path:nth-child(2){ fill:rgba(34,167,201,.30); }
  .c3.back .wordmark{ color:#fff; }
  .c3.back .web,.c3.back .scan{ color:var(--ocean-300); }
  .c3.back .qrfg{ stroke:var(--abyss-900); }

  /* ---------- print: real size, one card per page ---------- */
  @media print{
    @page{ size:88.9mm 50.8mm; margin:0; }
    :root{ --s:1; }
    body{ background:#fff; padding:0; }
    .page-head,.toolbar,.concept>h2,.concept>.sub,.label{ display:none !important; }
    .concept{ margin:0; max-width:none; }
    .row{ display:block; gap:0; }
    .stage{ box-shadow:none; border-radius:0; width:88.9mm; height:50.8mm; page-break-after:always; }
    .card{ border-radius:0; box-shadow:none; }
  }
</style>
</head>
<body>
  <div class="page-head">
    <h1>Navvic — Business Card Concepts</h1>
    <p>Three minimalist, ocean-theme directions for <b>navvic.com</b>. Each shows the front (contact details) and back (QR code → website) for both people. Tip: <b>Print → Save as PDF</b> outputs each card at true size (88.9 × 50.8&nbsp;mm), one per page.</p>
  </div>
  <div class="toolbar"><button onclick="window.print()">Print / Save as PDF</button></div>

  <div id="app"></div>

<script>
/* Real scannable QR for https://navvic.com (quiet zone included) */
const QR_FG = "M4 4.5h7m2 0h2m1 0h4m2 0h7M4 5.5h1m5 0h1m1 0h9m1 0h1m5 0h1M4 6.5h1m1 0h3m1 0h1m2 0h2m4 0h1m2 0h1m1 0h3m1 0h1M4 7.5h1m1 0h3m1 0h1m2 0h3m1 0h1m4 0h1m1 0h3m1 0h1M4 8.5h1m1 0h3m1 0h1m1 0h1m1 0h6m2 0h1m1 0h3m1 0h1M4 9.5h1m5 0h1m2 0h2m1 0h1m1 0h3m1 0h1m5 0h1M4 10.5h7m1 0h1m1 0h1m1 0h1m1 0h1m1 0h1m1 0h7M16 11.5h1M4 12.5h1m1 0h1m1 0h1m1 0h1m2 0h1m6 0h1m3 0h1m2 0h1M4 13.5h1m1 0h2m4 0h3m1 0h2m2 0h3m5 0h1M4 14.5h1m2 0h1m2 0h2m2 0h1m1 0h1m1 0h1m1 0h1m1 0h1m3 0h3M4 15.5h1m2 0h2m2 0h2m2 0h4m1 0h1m3 0h1m2 0h1M4 16.5h1m1 0h1m1 0h3m1 0h1m5 0h5m2 0h1m1 0h2M7 17.5h1m1 0h1m2 0h1m2 0h1m2 0h1m3 0h1m2 0h1m2 0h1M4 18.5h1m2 0h1m2 0h1m3 0h1m2 0h1m3 0h3m2 0h3M5 19.5h2m1 0h1m4 0h1m1 0h1m5 0h2m1 0h1m2 0h1M4 20.5h1m1 0h1m1 0h4m4 0h1m3 0h6M12 21.5h6m1 0h2m3 0h2m1 0h2M4 22.5h7m2 0h1m1 0h2m1 0h3m1 0h1m1 0h2m1 0h2M4 23.5h1m5 0h1m2 0h1m2 0h3m1 0h1m3 0h2m1 0h2M4 24.5h1m1 0h3m1 0h1m1 0h1m2 0h1m2 0h1m1 0h6m2 0h1M4 25.5h1m1 0h3m1 0h1m3 0h2m2 0h1m4 0h4M4 26.5h1m1 0h3m1 0h1m1 0h1m4 0h1m3 0h1m2 0h1m3 0h1M4 27.5h1m5 0h1m2 0h1m1 0h1m3 0h2m3 0h2m1 0h1M4 28.5h7m1 0h1m1 0h1m1 0h1m2 0h2m2 0h1m3 0h2";
const qr = () => `<svg viewBox="0 0 33 33" shape-rendering="crispEdges"><path class="qrbg" d="M0 0h33v33H0z"/><path class="qrfg" d="${QR_FG}"/></svg>`;
/* Navvic Wave Chevrons mark (matches the website logo) */
const mark = `<svg class="mark" viewBox="0 0 64 64" fill="none"><g stroke="currentColor" stroke-width="4.6" stroke-linecap="round" stroke-linejoin="round"><path d="M16 27 L32 17 L48 27"/><path d="M16 38 L32 28 L48 38"/><path d="M16 49 L32 39 L48 49"/></g></svg>`;
/* funky cargo ship stacked with containers, puffing along */
const ship = `<svg class="ship" viewBox="12 0 96 67" fill="none" preserveAspectRatio="xMidYMid meet">
  <circle cx="40" cy="20" r="3.4" fill="#9cc6da" opacity=".55"/>
  <circle cx="46" cy="13" r="4.6" fill="#9cc6da" opacity=".42"/>
  <circle cx="54" cy="7" r="6" fill="#9cc6da" opacity=".30"/>
  <rect x="33" y="24" width="9" height="17" rx="2" fill="#15527e"/>
  <rect x="33" y="29" width="9" height="3.4" fill="#f9735c"/>
  <rect x="17" y="29" width="13" height="14" rx="2" fill="#1a608f"/>
  <rect x="19.5" y="32" width="3" height="3" rx=".5" fill="#57c6e0"/>
  <rect x="24" y="32" width="3" height="3" rx=".5" fill="#57c6e0"/>
  <rect x="46" y="34" width="17" height="9" rx="1.6" fill="#22a7c9"/>
  <rect x="64" y="34" width="17" height="9" rx="1.6" fill="#f9735c"/>
  <rect x="82" y="34" width="15" height="9" rx="1.6" fill="#57c6e0"/>
  <rect x="50" y="25" width="17" height="9" rx="1.6" fill="#0b6e8f"/>
  <rect x="68" y="25" width="17" height="9" rx="1.6" fill="#f5a524"/>
  <rect x="59" y="16" width="17" height="9" rx="1.6" fill="#22a7c9"/>
  <path d="M14 44 H106 L97 60 Q93 65 86 65 H34 Q27 65 23 60 Z" fill="#15527e"/>
  <rect x="14" y="44" width="92" height="4.4" fill="#f9735c"/>
  <circle cx="40" cy="55" r="1.9" fill="#57c6e0"/>
  <circle cx="52" cy="55" r="1.9" fill="#57c6e0"/>
  <circle cx="64" cy="55" r="1.9" fill="#57c6e0"/>
  <circle cx="76" cy="55" r="1.9" fill="#57c6e0"/>
  <circle cx="88" cy="55" r="1.9" fill="#57c6e0"/>
</svg>`;
const iMail = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/></svg>`;
const iPhone = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92Z"/></svg>`;
const wave = `<svg class="wave" viewBox="0 0 320 70" preserveAspectRatio="none"><path d="M0 34 C60 14 120 54 180 38 C240 22 290 44 320 34 L320 70 L0 70 Z" fill="rgba(34,167,201,.14)"/><path d="M0 46 C70 30 130 60 200 46 C260 34 300 52 320 44 L320 70 L0 70 Z" fill="rgba(11,110,143,.22)"/></svg>`;

const people = [
  { name:"Abhishek Rathi",    email:"abhishek@navvic.com", phone:"+91 85038 63962" },
  { name:"Abhinav Srivastava", email:"abhinav@navvic.com",  phone:"+91 79856 52757" },
];
const concepts = [
  { cls:"c1", name:"Concept 1 · Abyss", sub:"Deep-navy, premium and quiet. Ocean accents on dark." },
  { cls:"c2", name:"Concept 2 · Foam",  sub:"Clean white front, ocean-gradient back. Crisp and corporate." },
  { cls:"c3", name:"Concept 3 · Wave",  sub:"Light front with a subtle wave, dark back. Friendly and modern." },
];

const front = (p) => `
  <div class="card front">
    <div class="glow"></div><div class="shipglow"></div>${ship}${wave}<div class="bar"></div>
    <div class="inner">
      <div class="brandrow">
        <span class="mono">${mark}</span>
        <span>
          <span class="wordmark">Nav<span class="ac">vic</span></span>
          <div class="tag">Global Trade &amp; Logistics</div>
        </span>
      </div>
      <div class="spacer"></div>
      <div class="name">${p.name}</div>
      <div class="rule"></div>
      <div class="contacts">
        <span class="c">${iMail}${p.email}</span>
        <span class="c">${iPhone}${p.phone}</span>
      </div>
      <div class="spacer"></div>
      <div class="web">navvic.com</div>
    </div>
  </div>`;

const back = () => `
  <div class="card back">
    <div class="glow"></div>${wave}
    <div class="inner">
      <div class="wordmark">Nav<span class="ac">vic</span></div>
      <div class="qrpanel" style="margin-top:3mm">${qr()}</div>
      <div class="scan">Scan to visit</div>
      <div class="web">navvic.com</div>
    </div>
  </div>`;

const stage = (html) => `<div class="stage">${html}</div>`;
const unit = (cls, label, html) => `<div class="unit ${cls}">${stage(html)}<div class="label">${label}</div></div>`;

document.getElementById("app").innerHTML = concepts.map(c => `
  <section class="concept">
    <h2>${c.name}</h2>
    <div class="sub">${c.sub}</div>
    <div class="row">
      ${people.map(p => `
        ${unit(c.cls, `<b>${p.name}</b> · Front`, front(p))}
        ${unit(c.cls+" back", `<b>${p.name}</b> · Back`, back())}
      `).join("")}
    </div>
  </section>
`).join("");
</script>
</body>
</html>
